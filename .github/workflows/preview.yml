name: PR Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          BASE_PATH: /Food-planner/pr-preview/pr-${{ github.event.pull_request.number }}

      - name: Deploy preview
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages
          target-folder: pr-preview/pr-${{ github.event.pull_request.number }}
          clean: true

      - name: Post preview URL comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: pr-preview
          message: |
            ### Preview URL
            **${{ github.event.pull_request.head.sha }}** deployed to:

            https://atom49.github.io/Food-planner/pr-preview/pr-${{ github.event.pull_request.number }}/

            _(updated on every push to this PR)_
